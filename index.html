<!DOCTYPE html>
<html>
  <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Three Divs Side by Side</title>
  <!-- <link rel="stylesheet" type="text/css" href="./styles.css"> -->
  <style>
.container {
    display: flex; /* Use flexbox */
    justify-content: space-between; /* Distribute space between divs */
    width: 100%; /* Full width of the viewport */
  }

  /* Style for each div */
  .lnr {
    width: calc(25% - 20px); /* One third of the viewport width with some margin */
    height: 100%;
    padding: 20px;
    border: 1px solid #ccc;
    box-sizing: border-box;
  }
  .center {
    width: calc(50% - 20px); /* One third of the viewport width with some margin */
    height: 100%;
    padding: 20px;
    border: 1px solid #ccc;
    box-sizing: border-box;
  }
  </style>
  </head>
  <body>
    <div class="container">

      <div class="lnr">
        <p>div 1</p>
      </div>
      <div class="center">
        <p> Hello world! </p>
      </div>
      <div class="lnr">
        <p>div 3</p>
      </div>
    </div>
  </body>
</html>
